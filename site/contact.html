<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CulturaConnect — Contact</title>
  <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">CulturaConnect</a>
      <nav class="main-nav">
        <button class="nav-toggle" aria-label="Ouvrir le menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
        <ul class="nav-list">
          <li><a href="index.html">Accueil</a></li>
          <li><a href="apropos.html">L'association</a></li>
          <li><a href="evenements.html">Événements</a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
          <li><a href="proposer.html">Proposer un événement</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-header">
      <div class="container">
        <h1>Contact</h1>
        <p class="hero-subtitle">Une question ? Écrivez-nous, on répond sous quelques jours.</p>
      </div>
    </section>

    <section class="content-block">
      <div class="container container-narrow">
        <form id="contact-form" class="form" novalidate>
          <div class="form-group">
            <label for="nom">Nom</label>
            <input type="text" id="nom" name="nom" required>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
          </div>

          <div class="form-group">
            <label for="sujet">Sujet</label>
            <input type="text" id="sujet" name="sujet" required>
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required></textarea>
          </div>

          <p id="form-feedback" class="form-feedback" hidden></p>

          <button type="submit" class="btn btn-primary">Envoyer</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 CulturaConnect — Association culturelle fictive (projet DSP).</p>
    </div>
  </footer>

  <script src="js/forms.js"></script>
  <script src="js/nav.js"></script>
</body>
</html>
